# Etapa 11: reemplaza el nginx.conf COMPLETO de la imagen base (no solo
# el fragmento de conf.d), porque worker_processes es una directiva de
# contexto global -- no se puede tocar desde adentro de un archivo
# incluido en el bloque http.
#
# worker_processes 1: el round-robin de nginx es por WORKER, no global --
# cada worker mantiene su propio contador y arranca por el primer server
# del upstream. Con "auto" (default de la imagen), Docker Desktop le
# reporta al contenedor los CPUs lógicos del host (16 acá) y nginx levanta
# 16+ workers; en una prueba local de pocos requests, cada uno cae en un
# worker recién arrancado y todos pegan contra app1 -- probado en vivo,
# 6/6 requests fueron al mismo backend antes de este fix. Para ESTA etapa
# (ver el balanceo funcionando, no aguantar tráfico real) un solo worker
# alcanza y hace el round-robin visible y determinístico.
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # round-robin es el default de upstream, no hace falta declararlo.
    #
    # max_fails=1 fail_timeout=5s: si una instancia no contesta (la
    # matamos a propósito para probar failover), nginx la marca "down"
    # por 5s en vez de seguir intentando contra un backend muerto en cada
    # request -- así se ve degradación (más lento un momento) en vez de
    # que cada request individual espere el timeout completo contra la
    # instancia caída.
    upstream indor_api {
        server app1:8080 max_fails=1 fail_timeout=5s;
        server app2:8080 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://indor_api;
            # Si la instancia elegida no responde (backend caído, no un
            # 4xx/5xx de la app), reintenta automáticamente contra la
            # otra ANTES de devolverle nada al cliente -- esto es lo que
            # prueba que "apagar una instancia no corta el servicio".
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Solo para esta etapa -- ver en la respuesta real qué
            # instancia contestó, sin tener que mirar los logs de cada
            # contenedor.
            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
