version: 2
updates:
  # Alertas de seguridad de dependencias (jjwt sin uso real era SEC-10 del
  # audit -- Dependabot es justo lo que hubiera marcado eso) + PRs
  # semanales para versiones desactualizadas de Spring Boot/mapstruct/etc.
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
