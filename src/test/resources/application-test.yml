# Perfil "test" (application-test.yml), no application.yml a secas -- a
# propósito, encontrado en la Etapa 9. Un application.yml en test/resources
# con ese nombre exacto NO se combina con el de main/resources: lo
# REEMPLAZA por completo, porque ambos compiten por la misma ruta de
# classpath ("application.yml") y solo uno gana. Eso significaba que
# open-in-view=false, los límites de multipart y (recién lo notamos acá)
# management.endpoints.web.exposure.include del application.yml real
# nunca estuvieron activos en ningún test de este proyecto.
#
# Como archivo de PERFIL (application-{profile}.yml), en cambio, Spring
# SÍ lo carga en capas sobre el application.yml base -- este archivo solo
# necesita listar lo que es genuinamente distinto en tests (JWT de
# prueba, storage en target/), todo lo demás lo hereda del real. Requiere
# @ActiveProfiles("test") en AbstractIntegrationTest para activarse.
#
# spring.datasource.* NO aparece acá: lo completa AbstractIntegrationTest
# en runtime vía @DynamicPropertySource, apuntando al contenedor MySQL
# efímero que arranca una sola vez por corrida de tests.
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        # Habilita Statistics para que los tests puedan afirmar "esto NO
        # dispara N+1" contando queries de verdad (getPrepareStatementCount),
        # no confiando en que alguien mire el log a mano como en la Etapa 6.
        generate_statistics: true

security:
  jwt:
    secret: test-only-secret-nunca-usar-en-produccion-1234567890
    issuer: indor-callejero-api-test
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    cookie-secure: false
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    max-attempts: 5
    window-seconds: 60

storage:
  local:
    # Dentro de target/, no del ./uploads real de dev -- mvn clean lo
    # limpia solo, y target/ ya está en .gitignore.
    base-path: ./target/test-uploads
