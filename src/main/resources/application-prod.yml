# Perfil de PRODUCCIÓN. Se activa explícitamente:
#   SPRING_PROFILES_ACTIVE=prod
#
# ddl-auto=validate: la app JAMÁS modifica el esquema en producción, solo
# verifica que coincida con lo que las entidades esperan. Si no coincide,
# falla el arranque en vez de alterar la BD en caliente (esto es lo que
# SEC-07 del audit encontró mal configurado). El esquema real se gestiona
# con migraciones versionadas — las incorporamos cuando aparezca la primera
# entidad persistente, en la Etapa 1.
#
# Sin valores por defecto en las variables de entorno: si falta DB_URL,
# DB_USER o DB_PASSWORD, el arranque debe fallar ruidosamente, no arrancar
# con un default silencioso.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO

security:
  jwt:
    cookie-secure: true
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}

# springdoc los deja habilitados por defecto (avisa esto mismo en el log de
# arranque). Decisión definitiva, no un pendiente: aunque la Etapa 2 ya
# asegura el resto de la API, /v3/api-docs sigue siendo un mapa completo de
# la superficie de ataque -- útil para vos, también para quien esté
# reconociendo el sistema desde afuera. Si en el futuro hace falta exponerlo
# en prod, que sea detrás de una capa aparte (ingress interno, VPN), no de
# la autenticación de la app.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
