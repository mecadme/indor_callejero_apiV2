spring:
  application:
    name: indor-callejero-api
  servlet:
    multipart:
      # Alineado al límite real de FileContentValidator (5MB) -- el default
      # de Spring Boot es 1MB. Sin este ajuste, un archivo de 3MB que
      # nuestro propio validador aceptaría rebota antes, con un error de
      # Spring que no dice nada sobre el límite real de la app.
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    # Por defecto Spring Boot mantiene la sesión de Hibernate abierta durante
    # el renderizado de la respuesta ("Open Session in View"). Es cómodo
    # porque oculta errores de lazy-loading, pero también los oculta:
    # mantiene una conexión de BD retenida más tiempo del necesario en cada
    # request y es la puerta de entrada más común al problema N+1 (PERF-02
    # del audit). Lo desactivamos ahora, antes de que exista una sola
    # entidad, para que cada acceso a una relación LAZY sea una decisión
    # explícita del service, no un accidente del framework.
    open-in-view: false
  # SEC-04/PERF-04 del audit: blacklist de JWT y caché de standings/calendario
  # viven acá ahora, no en memoria de una sola instancia.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # type: redis alcanza para que Spring Boot arme un RedisCacheManager --
  # el TTL y el serializador JSON se configuran en código
  # (CacheConfig.cacheConfiguration()), no acá, para que haya un solo
  # lugar que decida esto y no dos que puedan desincronizarse.
  cache:
    type: redis

server:
  port: ${PORT:8080}

security:
  jwt:
    # Sin valor por defecto para el secret -- si falta JWT_SECRET, el
    # arranque falla. Un secreto de firma con un default hardcodeado es
    # peor que no tener JWT.
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:indor-callejero-api}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}     # 15 min
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000} # 7 días
  rate-limit:
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:5}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

storage:
  local:
    # PERF-05 del audit sigue sin resolverse del todo acá a propósito: esto
    # sigue siendo disco local, incompatible con más de una instancia. Lo
    # que cambia es que StorageService es una interfaz -- el día de la
    # Etapa 10/Redis (o antes, si hace falta), una S3StorageService
    # reemplaza esta clase sin que TeamService ni FileController se enteren.
    base-path: ${STORAGE_BASE_PATH:./uploads}

# PERF-09 del audit: sin Actuator, un incidente se diagnostica a ciegas.
# Solo se exponen los tres endpoints que de verdad hacen falta -- no
# "*" (todo), que expondría /env y /configprops con secretos incluidos.
# Quién puede LEER cada uno se decide en SecurityConfig, no acá.
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
